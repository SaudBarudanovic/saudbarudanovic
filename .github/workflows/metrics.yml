name: Metrics

on:
  schedule:
    - cron: '0 3 * * *'   # Daily at 3 AM UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/metrics.yml'

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ─── PageSpeed: navhaus.com ────────────────────────────────────────────
      - name: PageSpeed - navhaus.com
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: SaudBarudanovic
          base: ''
          template: classic
          plugin_pagespeed: yes
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}
          plugin_pagespeed_url: https://navhaus.com
          plugin_pagespeed_detailed: yes
          plugin_pagespeed_screenshot: no
          config_timezone: Europe/Sarajevo
          filename: metrics.pagespeed.svg

      # ─── Languages ────────────────────────────────────────────────────────
      - name: Languages breakdown
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: SaudBarudanovic
          base: ''
          template: classic
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          config_timezone: Europe/Sarajevo
          filename: metrics.languages.svg

      # ─── Recent activity ──────────────────────────────────────────────────
      - name: Recent activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: SaudBarudanovic
          base: ''
          template: classic
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, pr, issue, release, review
          config_timezone: Europe/Sarajevo
          filename: metrics.activity.svg

      # ─── Achievements ─────────────────────────────────────────────────────
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: SaudBarudanovic
          base: ''
          template: classic
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0
          filename: metrics.achievements.svg

      # ─── Coding habits ────────────────────────────────────────────────────
      - name: Coding habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: SaudBarudanovic
          base: ''
          template: classic
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          config_timezone: Europe/Sarajevo
          filename: metrics.habits.svg

